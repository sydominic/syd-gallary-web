<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AX Gallery Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    :root {
      --bg: #f6f3ec;
      --panel: #ffffff;
      --ink: #1f2428;
      --muted: #697078;
      --line: #d9d2c4;
      --accent: #8f6a20;
      --danger: #a83232;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(246, 243, 236, 0.96);
    }
    h1 { margin: 0; font-size: 20px; }
    main { padding: 18px; }
    button, input, textarea, select {
      font: inherit;
      border: 1px solid var(--line);
      border-radius: 6px;
    }
    button {
      min-height: 34px;
      padding: 7px 11px;
      color: var(--ink);
      background: #fff;
      cursor: pointer;
    }
    button.primary {
      color: #fff;
      border-color: var(--accent);
      background: var(--accent);
    }
    button.danger {
      color: #fff;
      border-color: var(--danger);
      background: var(--danger);
    }
    input, textarea, select {
      width: 100%;
      min-height: 34px;
      padding: 7px 9px;
      background: #fff;
    }
    textarea {
      min-height: 84px;
      resize: vertical;
    }
    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .auth, .status, .filters, .guide {
      margin-bottom: 14px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .status {
      white-space: pre-wrap;
    }
    .status.error {
      border-color: #d6a5a5;
      color: #7b1f1f;
      background: #fff4f4;
      white-space: pre-wrap;
    }
    .status.ok {
      border-color: #9bc69b;
      color: #245b24;
      background: #f3fff3;
      white-space: pre-wrap;
    }
    .auth {
      display: grid;
      grid-template-columns: minmax(160px, 1fr) minmax(160px, 1fr) auto;
      gap: 10px;
      align-items: end;
    }
    .guide {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .filters {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) repeat(3, minmax(120px, 0.5fr));
      gap: 10px;
      align-items: end;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }
    .card {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .card-head {
      display: flex;
      gap: 8px;
      align-items: start;
      justify-content: space-between;
    }
    .slot-title { font-size: 15px; font-weight: 800; }
    .slot-meta { color: var(--muted); font-size: 12px; }
    .preview {
      width: 100%;
      aspect-ratio: 4 / 3;
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #191919;
      color: #c8c8c8;
      font-size: 13px;
    }
    .preview img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .row2 {
      display: grid;
      grid-template-columns: 1fr 0.55fr;
      gap: 8px;
    }
    .row3 {
      display: grid;
      grid-template-columns: 1fr 1fr 0.5fr;
      gap: 8px;
    }
    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }
    .visible {
      display: flex;
      gap: 7px;
      align-items: center;
      color: var(--ink);
      font-size: 13px;
      font-weight: 650;
    }
    .visible input { width: auto; min-height: auto; }
    .note { color: var(--muted); font-size: 13px; }
    .setup-list {
      margin: 8px 0 0;
      padding-left: 20px;
      line-height: 1.55;
    }
    @media (max-width: 720px) {
      header { align-items: stretch; flex-direction: column; }
      .auth, .filters, .row2, .row3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>AX Gallery Admin</h1>
      <div class="note">이미지와 설명을 저장하면 WebGL 전시가 Supabase에서 바로 읽습니다.</div>
    </div>
    <div class="toolbar">
      <button id="openGallery">전시 열기</button>
      <button id="refresh">새로고침</button>
      <button id="checkSetup">설정 확인</button>
      <button id="exportCsv">CSV 백업</button>
      <button id="exportZip">이미지 ZIP 백업</button>
      <button id="importCsv">CSV 복원</button>
      <button id="importZip">ZIP 복원</button>
      <input id="csvInput" type="file" accept=".csv,text/csv" hidden>
      <input id="zipInput" type="file" accept=".zip,application/zip" hidden>
    </div>
  </header>
  <main>
    <section class="auth" id="authPanel">
      <label>관리자 이메일<input id="email" type="email" autocomplete="username"></label>
      <label>비밀번호<input id="password" type="password" autocomplete="current-password"></label>
      <button class="primary" id="login">로그인</button>
    </section>
    <section class="status" id="status">초기화 중</section>
    <section class="guide">
      <strong>업로드 순서</strong>
      <span>슬롯 선택 → 이미지 선택 → 작품명/작가/연도/설명 입력 → 표시 체크 → 저장. 전시장에서는 새로고침 또는 F5로 반영됩니다.</span>
      <span>JPG/PNG만 지원합니다. 긴 변 2200px 초과 또는 1.2MB 초과 이미지는 저장 전에 자동으로 웹 전시용 JPEG로 축소됩니다.</span>
    </section>
    <section class="filters">
      <label>검색<input id="filterSearch" placeholder="작품명, 작가, 설명 검색"></label>
      <label>층
        <select id="filterFloor">
          <option value="all">전체층</option>
          <option value="0">1층</option>
          <option value="1">2층</option>
          <option value="2">3층</option>
        </select>
      </label>
      <label>유형
        <select id="filterType">
          <option value="all">전체유형</option>
          <option value="Main">Main</option>
          <option value="Wall">Wall</option>
          <option value="Stair">Stair</option>
          <option value="Easel">Easel</option>
        </select>
      </label>
      <label>상태
        <select id="filterState">
          <option value="all">전체상태</option>
          <option value="visible">표시중</option>
          <option value="hidden">숨김</option>
          <option value="empty">빈 슬롯</option>
          <option value="filled">이미지 있음</option>
        </select>
      </label>
    </section>
    <section class="grid" id="grid"></section>
  </main>

  <script>
    const slotMap = [
      [0, 0, "Wall"], [1, 0, "Wall"], [2, 1, "Wall"], [3, 2, "Wall"],
      [4, 0, "Main"], [5, 0, "Main"], [6, 1, "Main"], [7, 1, "Main"], [8, 2, "Main"], [9, 2, "Main"],
      [10, 0, "Stair"], [11, 0, "Stair"], [12, 0, "Stair"], [13, 0, "Stair"],
      [14, 1, "Stair"], [15, 1, "Stair"], [16, 1, "Stair"], [17, 1, "Stair"],
      [18, 0, "Easel"], [19, 0, "Easel"], [20, 0, "Easel"], [21, 0, "Easel"], [22, 0, "Easel"], [23, 0, "Easel"],
      [24, 1, "Easel"], [25, 1, "Easel"], [26, 1, "Easel"], [27, 1, "Easel"], [28, 1, "Easel"],
      [29, 2, "Easel"], [30, 2, "Easel"], [31, 2, "Easel"], [32, 2, "Easel"]
    ].map(([slot_index, floor_index, exhibition_type]) => ({ slot_index, floor_index, exhibition_type }));

    let config;
    let db;
    let records = new Map();
    let filtersReady = false;
    let setupReady = false;
    const uploadImageMaxEdge = 2200;
    const uploadImageQuality = 0.86;
    const uploadImageOptimizeAboveBytes = 1200 * 1024;

    const $ = (id) => document.getElementById(id);
    const status = (message, kind = "") => {
      $("status").className = `status ${kind}`.trim();
      $("status").textContent = message;
    };
    const statusHtml = (html, kind = "") => {
      $("status").className = `status ${kind}`.trim();
      $("status").innerHTML = html;
    };
    const safeName = (name) => (name || "artwork").replace(/[^a-zA-Z0-9._-]+/g, "_");

    async function init() {
      renderEmptySlots();
      await loadConfig();
      validateConfigOrThrow();
      db = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
      setupReady = true;
      const { data, error } = await db.auth.getSession();
      if (error) throw friendlyError(error);
      if (data.session) $("authPanel").style.display = "none";
      await loadRecords();
    }

    async function loadConfig() {
      let response;
      try {
        response = await fetch("gallery_config.json", { cache: "no-store" });
      } catch (error) {
        throw new Error(
          "gallery_config.json을 불러오지 못했습니다.\n" +
          "Render/GitHub에 gallery_config.json 파일이 index.html, admin.html과 같은 위치에 있는지 확인하세요.\n\n" +
          `원문 오류: ${error.message}`
        );
      }
      if (!response.ok) {
        throw new Error(`gallery_config.json 로드 실패: HTTP ${response.status}`);
      }
      config = await response.json();
    }

    function validateConfigOrThrow() {
      const url = (config && config.supabaseUrl || "").trim();
      const key = (config && config.supabaseAnonKey || "").trim();
      const hasPlaceholder =
        !url ||
        !key ||
        url.includes("YOUR_PROJECT_ID") ||
        key.includes("YOUR_SUPABASE_ANON_KEY") ||
        url.includes("YOUR_") ||
        key.includes("YOUR_");
      if (hasPlaceholder) {
        throw new Error(
          "Supabase 설정이 아직 입력되지 않았습니다.\n\n" +
          "수정할 파일: gallery_config.json\n\n" +
          "필수 입력값:\n" +
          "1. supabaseUrl: Supabase Project URL\n" +
          "2. supabaseAnonKey: Supabase anon public key\n\n" +
          "현재 파일에 YOUR_PROJECT_ID 또는 YOUR_SUPABASE_ANON_KEY가 남아 있으면 로그인/저장/업로드가 모두 실패합니다."
        );
      }
      if (!/^https:\/\/[a-z0-9-]+\.supabase\.co$/i.test(url)) {
        throw new Error(
          "supabaseUrl 형식이 이상합니다.\n" +
          "예시 형식: https://프로젝트ID.supabase.co\n\n" +
          `현재 값: ${url}`
        );
      }
      if (!config.artworksTable) config.artworksTable = "gallery_artworks";
      if (!config.imageBucket) config.imageBucket = "gallery-artworks";
    }

    async function login() {
      ensureSetupReady();
      status("로그인 중");
      const { error } = await db.auth.signInWithPassword({
        email: $("email").value.trim(),
        password: $("password").value
      });
      if (error) throw friendlyError(error);
      $("authPanel").style.display = "none";
      await loadRecords();
    }

    async function loadRecords() {
      ensureSetupReady();
      status("전시 데이터 불러오는 중");
      const { data, error } = await db
        .from(config.artworksTable)
        .select("*")
        .order("slot_index", { ascending: true });
      if (error) throw friendlyError(error);
      records = new Map((data || []).map((row) => [row.slot_index, row]));
      renderEmptySlots();
      status(`로드 완료: ${records.size}개 저장됨 / 33 슬롯`, "ok");
    }

    function publicUrl(path) {
      if (!path) return "";
      if (config.publicImageBaseUrl) return `${config.publicImageBaseUrl.replace(/\/$/, "")}/${path}`;
      return db.storage.from(config.imageBucket).getPublicUrl(path).data.publicUrl;
    }

    function renderEmptySlots() {
      bindFilters();
      const visibleSlots = getVisibleSlots();
      $("grid").innerHTML = visibleSlots.map((slot) => cardHtml(slot, records.get(slot.slot_index) || {})).join("");
      visibleSlots.forEach((slot) => {
        const row = records.get(slot.slot_index) || {};
        const file = $(`file-${slot.slot_index}`);
        file.addEventListener("change", () => previewLocal(slot.slot_index, file.files[0]));
        $(`save-${slot.slot_index}`).addEventListener("click", () => runAdminAction(() => saveSlot(slot)));
        $(`clear-${slot.slot_index}`).addEventListener("click", () => runAdminAction(() => clearImage(slot)));
      });
    }

    function bindFilters() {
      if (filtersReady) return;
      ["filterSearch", "filterFloor", "filterType", "filterState"].forEach((id) => {
        $(id).addEventListener("input", renderEmptySlots);
        $(id).addEventListener("change", renderEmptySlots);
      });
      filtersReady = true;
    }

    function getVisibleSlots() {
      const query = $("filterSearch").value.trim().toLowerCase();
      const floor = $("filterFloor").value;
      const type = $("filterType").value;
      const stateFilter = $("filterState").value;
      return slotMap.filter((slot) => {
        const row = records.get(slot.slot_index) || {};
        if (floor !== "all" && String(slot.floor_index) !== floor) return false;
        if (type !== "all" && slot.exhibition_type !== type) return false;
        const hasImage = !!(row.image_path || row.image_url);
        const visible = row.visible !== false;
        if (stateFilter === "visible" && !visible) return false;
        if (stateFilter === "hidden" && visible) return false;
        if (stateFilter === "empty" && hasImage) return false;
        if (stateFilter === "filled" && !hasImage) return false;
        if (!query) return true;
        return [
          slot.slot_index + 1,
          slot.floor_index + 1,
          slot.exhibition_type,
          row.title,
          row.artist,
          row.year,
          row.description
        ].join(" ").toLowerCase().includes(query);
      });
    }

    function cardHtml(slot, row) {
      const imageUrl = row.image_url || publicUrl(row.image_path);
      const preview = imageUrl
        ? `<img id="preview-${slot.slot_index}" src="${imageUrl}" alt="">`
        : `<span id="preview-${slot.slot_index}">이미지 없음</span>`;
      return `
        <article class="card">
          <div class="card-head">
            <div>
              <div class="slot-title">슬롯 ${slot.slot_index + 1}</div>
              <div class="slot-meta">${slot.floor_index + 1}층 / ${slot.exhibition_type}</div>
            </div>
            <label class="visible"><input id="visible-${slot.slot_index}" type="checkbox" ${row.visible === false ? "" : "checked"}> 표시</label>
          </div>
          <div class="preview">${preview}</div>
          <label>이미지 업로드<input id="file-${slot.slot_index}" type="file" accept="image/png,image/jpeg"></label>
          <div class="row3">
            <label>작품명<input id="title-${slot.slot_index}" value="${escapeAttr(row.title || "")}"></label>
            <label>작가<input id="artist-${slot.slot_index}" value="${escapeAttr(row.artist || "")}"></label>
            <label>연도<input id="year-${slot.slot_index}" value="${escapeAttr(row.year || "")}"></label>
          </div>
          <label>설명<textarea id="desc-${slot.slot_index}">${escapeText(row.description || "")}</textarea></label>
          <div class="actions">
            <button class="primary" id="save-${slot.slot_index}">저장</button>
            <button class="danger" id="clear-${slot.slot_index}">이미지 제거</button>
          </div>
        </article>`;
    }

    function previewLocal(slotIndex, file) {
      if (!file) return;
      const url = URL.createObjectURL(file);
      const target = $(`preview-${slotIndex}`);
      target.outerHTML = `<img id="preview-${slotIndex}" src="${url}" alt="">`;
    }

    function buildStoragePath(slot, file) {
      const extension = file.extension || imageExtension(file);
      const token = Math.random().toString(36).slice(2, 8);
      const slotNumber = String(slot.slot_index + 1).padStart(2, "0");
      return [
        `${slot.floor_index + 1}F`,
        safePathSegment(slot.exhibition_type),
        `slot_${slotNumber}_${Date.now()}_${token}.${extension}`
      ].join("/");
    }

    function imageExtension(file) {
      const type = (file && file.type || "").toLowerCase();
      const name = (file && file.name || "").toLowerCase();
      if (type === "image/png" || name.endsWith(".png")) return "png";
      if (type === "image/jpeg" || name.endsWith(".jpg") || name.endsWith(".jpeg")) return "jpg";
      throw new Error("지원하지 않는 이미지 형식입니다. JPG 또는 PNG만 업로드하세요.");
    }

    async function prepareUploadImage(file) {
      const extension = imageExtension(file);
      const sourceSize = file.size || 0;
      const image = await loadImageElement(file);
      const sourceWidth = image.naturalWidth || image.width;
      const sourceHeight = image.naturalHeight || image.height;
      if (!sourceWidth || !sourceHeight) {
        throw new Error("이미지 크기를 읽지 못했습니다. 다른 JPG/PNG 파일로 다시 시도하세요.");
      }
      const longest = Math.max(sourceWidth, sourceHeight);
      const shouldResize = longest > uploadImageMaxEdge || sourceSize > uploadImageOptimizeAboveBytes;
      if (!shouldResize) {
        URL.revokeObjectURL(image.src);
        return {
          blob: file,
          extension,
          contentType: file.type || (extension === "png" ? "image/png" : "image/jpeg"),
          optimized: false,
          sourceWidth,
          sourceHeight,
          width: sourceWidth,
          height: sourceHeight,
          sourceSize,
          outputSize: sourceSize
        };
      }

      const scale = Math.min(1, uploadImageMaxEdge / longest);
      const width = Math.max(1, Math.round(sourceWidth * scale));
      const height = Math.max(1, Math.round(sourceHeight * scale));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const context = canvas.getContext("2d", { alpha: false });
      context.fillStyle = "#ffffff";
      context.fillRect(0, 0, width, height);
      context.imageSmoothingEnabled = true;
      context.imageSmoothingQuality = "high";
      context.drawImage(image, 0, 0, width, height);
      const blob = await canvasToBlob(canvas, "image/jpeg", uploadImageQuality);
      URL.revokeObjectURL(image.src);
      return {
        blob,
        extension: "jpg",
        contentType: "image/jpeg",
        optimized: true,
        sourceWidth,
        sourceHeight,
        width,
        height,
        sourceSize,
        outputSize: blob.size || 0
      };
    }

    function loadImageElement(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error("이미지를 읽지 못했습니다. JPG/PNG 파일인지 확인하세요."));
        };
        image.src = url;
      });
    }

    function canvasToBlob(canvas, type, quality) {
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (blob) resolve(blob);
          else reject(new Error("이미지 최적화에 실패했습니다."));
        }, type, quality);
      });
    }

    function formatBytes(bytes) {
      if (!bytes) return "0 KB";
      if (bytes < 1024 * 1024) return `${Math.max(1, Math.round(bytes / 1024))} KB`;
      return `${(bytes / 1024 / 1024).toFixed(2)} MB`;
    }

    function uploadSummary(prepared) {
      if (!prepared.optimized) {
        return `원본 유지: ${prepared.width}x${prepared.height}, ${formatBytes(prepared.outputSize)}`;
      }
      return `자동 최적화: ${prepared.sourceWidth}x${prepared.sourceHeight} / ${formatBytes(prepared.sourceSize)} → ${prepared.width}x${prepared.height} / ${formatBytes(prepared.outputSize)}`;
    }

    function safePathSegment(value) {
      return String(value || "Artwork")
        .replace(/[^a-zA-Z0-9_-]+/g, "_")
        .replace(/^_+|_+$/g, "") || "Artwork";
    }

    async function saveSlot(slot) {
      ensureSetupReady();
      await ensureLoggedIn();
      status(`슬롯 ${slot.slot_index + 1} 저장 중`);
      const current = records.get(slot.slot_index) || {};
      let image_path = current.image_path || "";
      const file = $(`file-${slot.slot_index}`).files[0];
      let preparedImage = null;
      if (file) {
        status(`슬롯 ${slot.slot_index + 1} 이미지 최적화 중`);
        preparedImage = await prepareUploadImage(file);
        image_path = buildStoragePath(slot, preparedImage);
        status(`슬롯 ${slot.slot_index + 1} 업로드 중\n${uploadSummary(preparedImage)}`);
        const { error: uploadError } = await db.storage
          .from(config.imageBucket)
          .upload(image_path, preparedImage.blob, { upsert: true, contentType: preparedImage.contentType });
        if (uploadError) throw friendlyError(uploadError);
      }

      const row = {
        slot_index: slot.slot_index,
        floor_index: slot.floor_index,
        exhibition_type: slot.exhibition_type,
        title: $(`title-${slot.slot_index}`).value.trim(),
        artist: $(`artist-${slot.slot_index}`).value.trim(),
        year: $(`year-${slot.slot_index}`).value.trim(),
        description: $(`desc-${slot.slot_index}`).value,
        image_path,
        image_url: "",
        visible: $(`visible-${slot.slot_index}`).checked,
        sort_order: slot.slot_index,
        updated_at: new Date().toISOString()
      };

      const { error } = await db.from(config.artworksTable).upsert(row, { onConflict: "slot_index" });
      if (error) throw friendlyError(error);
      records.set(slot.slot_index, row);
      status(`슬롯 ${slot.slot_index + 1} 저장 완료${preparedImage ? "\n" + uploadSummary(preparedImage) : ""}`, "ok");
      renderEmptySlots();
    }

    async function clearImage(slot) {
      ensureSetupReady();
      await ensureLoggedIn();
      const current = records.get(slot.slot_index);
      if (!current) return;
      status(`슬롯 ${slot.slot_index + 1} 이미지 제거 중`);
      if (current.image_path) {
        await db.storage.from(config.imageBucket).remove([current.image_path]);
      }
      const row = { ...current, image_path: "", image_url: "", updated_at: new Date().toISOString() };
      const { error } = await db.from(config.artworksTable).upsert(row, { onConflict: "slot_index" });
      if (error) throw friendlyError(error);
      records.set(slot.slot_index, row);
      renderEmptySlots();
      status(`슬롯 ${slot.slot_index + 1} 이미지 제거 완료`, "ok");
    }

    function exportCsv() {
      const headers = ["slot_index", "floor_index", "exhibition_type", "title", "artist", "year", "description", "image_path", "visible"];
      const rows = slotMap.map((slot) => {
        const row = records.get(slot.slot_index) || slot;
        return headers.map((key) => csvCell(row[key] ?? "")).join(",");
      });
      downloadText("ax_gallery_artworks.csv", [headers.join(","), ...rows].join("\r\n"));
    }

    async function exportZip() {
      ensureSetupReady();
      status("이미지 ZIP 백업 생성 중");
      const zip = new JSZip();
      zip.file("ax_gallery_artworks.csv", buildCsvText());
      for (const slot of slotMap) {
        const row = records.get(slot.slot_index);
        if (!row || !row.image_path) continue;
        const res = await fetch(publicUrl(row.image_path));
        if (!res.ok) continue;
        zip.file(row.image_path, await res.blob());
      }
      const blob = await zip.generateAsync({ type: "blob" });
      downloadBlob("ax_gallery_backup.zip", blob);
      status("이미지 ZIP 백업 완료", "ok");
    }

    async function importCsvFile(file) {
      ensureSetupReady();
      await ensureLoggedIn();
      if (!file) return;
      status("CSV 복원 중");
      const text = await readFileText(file);
      const rows = parseCsvText(text).map(normalizeImportedRow).filter(Boolean);
      await upsertImportedRows(rows);
      status(`CSV 복원 완료: ${rows.length}개 슬롯`, "ok");
    }

    async function importZipFile(file) {
      ensureSetupReady();
      await ensureLoggedIn();
      if (!file) return;
      status("ZIP 복원 준비 중");
      const zip = await JSZip.loadAsync(file);
      const csvEntry =
        zip.file("ax_gallery_artworks.csv") ||
        Object.values(zip.files).find((entry) => !entry.dir && /\.csv$/i.test(entry.name));
      if (!csvEntry) {
        throw new Error("ZIP 안에서 ax_gallery_artworks.csv를 찾지 못했습니다.");
      }

      const csvText = await csvEntry.async("text");
      const rows = parseCsvText(csvText).map(normalizeImportedRow).filter(Boolean);
      let restoredImages = 0;
      for (const row of rows) {
        if (!row.image_path) continue;
        const imageEntry = zip.file(row.image_path);
        if (!imageEntry) continue;
        status(`ZIP 이미지 복원 중: 슬롯 ${row.slot_index + 1}`);
        const blob = await imageEntry.async("blob");
        const { error } = await db.storage
          .from(config.imageBucket)
          .upload(row.image_path, blob, {
            upsert: true,
            contentType: storageContentType(row.image_path)
          });
        if (error) throw friendlyError(error);
        restoredImages++;
      }
      await upsertImportedRows(rows);
      status(`ZIP 복원 완료: ${rows.length}개 슬롯 / 이미지 ${restoredImages}개`, "ok");
    }

    async function upsertImportedRows(rows) {
      if (!rows.length) throw new Error("복원할 행이 없습니다.");
      const { error } = await db.from(config.artworksTable).upsert(rows, { onConflict: "slot_index" });
      if (error) throw friendlyError(error);
      records = new Map(rows.map((row) => [row.slot_index, row]));
      await loadRecords();
    }

    function normalizeImportedRow(row) {
      const slotIndex = Number(row.slot_index);
      if (!Number.isInteger(slotIndex) || slotIndex < 0 || slotIndex >= slotMap.length) return null;
      const slot = slotMap.find((item) => item.slot_index === slotIndex) || slotMap[slotIndex];
      const floorIndex = optionalInteger(row.floor_index);
      const sortOrder = optionalInteger(row.sort_order);
      return {
        slot_index: slotIndex,
        floor_index: floorIndex !== null ? floorIndex : slot.floor_index,
        exhibition_type: row.exhibition_type || slot.exhibition_type,
        title: row.title || "",
        artist: row.artist || "",
        year: row.year || "",
        description: row.description || "",
        image_path: row.image_path || "",
        image_url: row.image_url || "",
        visible: parseVisible(row.visible),
        sort_order: sortOrder !== null ? sortOrder : slotIndex,
        updated_at: new Date().toISOString()
      };
    }

    function optionalInteger(value) {
      const text = String(value ?? "").trim();
      if (!text) return null;
      const number = Number(text);
      return Number.isInteger(number) ? number : null;
    }

    function parseVisible(value) {
      if (typeof value === "boolean") return value;
      const text = String(value ?? "").trim().toLowerCase();
      return !(text === "false" || text === "0" || text === "no" || text === "off");
    }

    function parseCsvText(text) {
      const rows = parseCsvRows(String(text || "").replace(/^\ufeff/, ""));
      if (rows.length < 2) return [];
      const headers = rows[0].map((cell) => cell.trim());
      return rows.slice(1)
        .filter((row) => row.some((cell) => String(cell).trim()))
        .map((row) => Object.fromEntries(headers.map((header, index) => [header, row[index] ?? ""])));
    }

    function parseCsvRows(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let quoted = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];
        if (quoted) {
          if (ch === '"' && next === '"') {
            cell += '"';
            i++;
          } else if (ch === '"') {
            quoted = false;
          } else {
            cell += ch;
          }
        } else if (ch === '"') {
          quoted = true;
        } else if (ch === ",") {
          row.push(cell);
          cell = "";
        } else if (ch === "\n") {
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
        } else if (ch !== "\r") {
          cell += ch;
        }
      }
      row.push(cell);
      rows.push(row);
      return rows;
    }

    function readFileText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result || "");
        reader.onerror = () => reject(new Error("파일을 읽지 못했습니다."));
        reader.readAsText(file, "utf-8");
      });
    }

    function storageContentType(path) {
      const lower = String(path || "").toLowerCase();
      if (lower.endsWith(".png")) return "image/png";
      if (lower.endsWith(".webp")) return "image/webp";
      return "image/jpeg";
    }

    async function checkSetup() {
      status("설정 확인 중");
      await loadConfig();
      validateConfigOrThrow();
      db = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
      setupReady = true;
      const checks = [];
      checks.push(`Supabase URL: ${config.supabaseUrl}`);
      checks.push(`Table: ${config.artworksTable}`);
      checks.push(`Bucket: ${config.imageBucket}`);
      const { error } = await db.from(config.artworksTable).select("slot_index").limit(1);
      if (error) throw friendlyError(error);
      status(`설정 확인 완료\n${checks.join("\n")}`, "ok");
    }

    function ensureSetupReady() {
      if (!setupReady || !db) {
        throw new Error(
          "Supabase 설정이 준비되지 않았습니다.\n" +
          "먼저 gallery_config.json의 supabaseUrl / supabaseAnonKey 값을 확인하세요."
        );
      }
    }

    async function ensureLoggedIn() {
      const { data, error } = await db.auth.getSession();
      if (error) throw friendlyError(error);
      if (!data.session) {
        throw new Error("로그인이 필요합니다. 관리자 이메일과 비밀번호로 먼저 로그인하세요.");
      }
    }

    async function runAdminAction(action) {
      try {
        await action();
      } catch (error) {
        showError(error);
      }
    }

    function showError(error) {
      const message = friendlyError(error).message || String(error);
      status(message, "error");
    }

    function friendlyError(error) {
      const raw = error && (error.message || error.error_description || String(error)) || "알 수 없는 오류";
      if (/Failed to fetch|fetch failed|NetworkError/i.test(raw)) {
        return new Error(
          "Supabase에 연결하지 못했습니다.\n\n" +
          "확인 순서:\n" +
          "1. gallery_config.json의 supabaseUrl이 실제 Project URL인지 확인\n" +
          "2. gallery_config.json의 supabaseAnonKey가 anon public key인지 확인\n" +
          "3. Render에 수정된 gallery_config.json이 실제로 Push/Deploy 되었는지 확인\n" +
          "4. 회사/학교/공용망에서 Supabase 접속이 차단되지 않는지 확인\n\n" +
          `원문 오류: ${raw}`
        );
      }
      if (/Invalid login credentials/i.test(raw)) {
        return new Error("로그인 실패: 이메일 또는 비밀번호가 Supabase Auth 사용자와 일치하지 않습니다.");
      }
      if (/Invalid key/i.test(raw)) {
        return new Error(
          "Storage 파일 경로가 Supabase에서 거부되었습니다.\n\n" +
          "v67에서는 한글 원본 파일명을 저장 경로에 쓰지 않고 ASCII 안전 경로를 생성합니다.\n" +
          "이 메시지가 계속 나오면 Render에 v67 WebGL 빌드가 제대로 배포되었는지 확인하세요.\n\n" +
          `원문 오류: ${raw}`
        );
      }
      if (/row-level security|permission denied|violates row-level security|not authorized|Unauthorized/i.test(raw)) {
        return new Error(
          "권한 오류입니다.\n\n" +
          "확인 순서:\n" +
          "1. Supabase Auth에 해당 이메일 사용자가 생성되어 있는지 확인\n" +
          "2. supabase/schema.sql에서 CHANGE_ME_ADMIN_EMAIL@example.com을 실제 관리자 이메일로 바꿔 실행했는지 확인\n" +
          "3. gallery_admins 테이블에 로그인 이메일이 들어 있는지 확인\n" +
          "4. storage bucket 이름이 gallery-artworks인지 확인\n\n" +
          `원문 오류: ${raw}`
        );
      }
      return new Error(raw);
    }

    function buildCsvText() {
      const headers = ["slot_index", "floor_index", "exhibition_type", "title", "artist", "year", "description", "image_path", "visible"];
      const rows = slotMap.map((slot) => {
        const row = records.get(slot.slot_index) || slot;
        return headers.map((key) => csvCell(row[key] ?? "")).join(",");
      });
      return [headers.join(","), ...rows].join("\r\n");
    }

    function csvCell(value) {
      return `"${String(value).replace(/"/g, '""')}"`;
    }

    function downloadText(name, text) {
      downloadBlob(name, new Blob(["\ufeff", text], { type: "text/csv;charset=utf-8" }));
    }

    function downloadBlob(name, blob) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = name;
      a.click();
      URL.revokeObjectURL(url);
    }

    function escapeAttr(value) {
      return String(value).replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    }

    function escapeText(value) {
      return String(value).replace(/[&<>]/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[ch]));
    }

    $("login").addEventListener("click", () => runAdminAction(login));
    $("refresh").addEventListener("click", () => runAdminAction(loadRecords));
    $("checkSetup").addEventListener("click", () => runAdminAction(checkSetup));
    $("exportCsv").addEventListener("click", exportCsv);
    $("exportZip").addEventListener("click", () => runAdminAction(exportZip));
    $("importCsv").addEventListener("click", () => $("csvInput").click());
    $("importZip").addEventListener("click", () => $("zipInput").click());
    $("csvInput").addEventListener("change", () => {
      const file = $("csvInput").files[0];
      runAdminAction(() => importCsvFile(file)).finally(() => { $("csvInput").value = ""; });
    });
    $("zipInput").addEventListener("change", () => {
      const file = $("zipInput").files[0];
      runAdminAction(() => importZipFile(file)).finally(() => { $("zipInput").value = ""; });
    });
    $("openGallery").addEventListener("click", () => location.href = "index.html");

    init().catch(showError);
  </script>
</body>
</html>
